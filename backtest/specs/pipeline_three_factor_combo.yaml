spec_id: "pipeline_three_factor_combo"
benchmark: "SPY"
universe:
  market_cap_min_usd: 100000000000
  exclude_sectors: ["Utilities", "Energy", "Real Estate"]
  min_names: 20
factors:
  - name: "RS_Rating_B"
    params: {}
    transform: "rank_pct"
    weight: 0.4
  - name: "PMARP"
    params: {}
    transform: "rank_pct"
    weight: 0.4
  - name: "Attention_ZScore"
    params: {}
    transform: "rank_pct"
    weight: 0.2
combo:
  method: "weighted_sum"
portfolio:
  selection: "top_n"
  top_n: 20
  rebalance: "weekly"
  weighting: "inv_vol"
  vol_lookback_days: 60
  max_position_weight: 0.1
  max_annual_turnover: 15.0
execution:
  timing: "next_open"
  transaction_cost_bps: 5.0
  spread_bps: 2.0
evaluation:
  newey_west_lag_days: 5
period:
  start: "2021-01-04"
  train_end: "2024-12-31"
  test_end: "2025-12-31"
